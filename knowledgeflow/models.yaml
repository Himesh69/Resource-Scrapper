# ============================================================
# KnowledgeFlow — LLM Model Routing
# Primary: Google AI Studio (Gemini 2.5 Flash)
#
# Google AI Studio free tier limits:
#   - 20 requests/day (or extremely restricted per minute quota)
#   - To conserve this quota, max_tokens has been significantly reduced.
#
# Task routing:
#   extraction    → KnowledgeBuilderAgent, ResourceExtractorAgent
#   summary       → TranscriptAgent (summarization step)
#   classification → CategorizationAgent
#   enrichment    → EnrichmentAgent
#   deduplication → DeduplicationAgent
# ============================================================

models:
  extraction:
    model: gemini-3.1-flash-lite
    temperature: 0.1
    max_tokens: 4096
    json_mode: true

  summary:
    model: gemini-3.1-flash-lite
    temperature: 0.2
    max_tokens: 4096
    json_mode: false

  classification:
    model: gemini-3.1-flash-lite
    temperature: 0.0
    max_tokens: 1024
    json_mode: true

  enrichment:
    model: gemini-3.1-flash-lite
    temperature: 0.1
    max_tokens: 1024
    json_mode: true

  deduplication:
    model: gemini-3.1-flash-lite
    temperature: 0.0
    max_tokens: 1024
    json_mode: true

# Fallback model
fallback:
  model: gemini-3.1-flash-lite
  temperature: 0.2
  max_tokens: 1024
  json_mode: false
