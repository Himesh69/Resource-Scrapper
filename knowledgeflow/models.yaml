# ============================================================
# KnowledgeFlow — LLM Model Routing
# Primary: Google AI Studio (FREE Gemini 2.5 Flash)
# Fallback: OpenRouter free models (if Google AI fails)
#
# Google AI Studio free tier limits:
#   - 15 requests/minute
#   - 1,000,000 tokens/minute
#   - 1,500 requests/day
#
# Task routing:
#   extraction    → KnowledgeBuilderAgent, ResourceExtractorAgent
#   summary       → TranscriptAgent (summarization step)
#   classification → CategorizationAgent
#   enrichment    → EnrichmentAgent
#   deduplication → DeduplicationAgent
# ============================================================

models:
  extraction:
    model: gemini-2.5-flash
    temperature: 0.1
    max_tokens: 4096
    json_mode: true

  summary:
    model: gemini-2.5-flash
    temperature: 0.2
    max_tokens: 4096
    json_mode: false

  classification:
    model: gemini-2.5-flash
    temperature: 0.0
    max_tokens: 4096
    json_mode: true

  enrichment:
    model: gemini-2.5-flash
    temperature: 0.1
    max_tokens: 4096
    json_mode: true

  deduplication:
    model: gemini-2.5-flash
    temperature: 0.0
    max_tokens: 512
    json_mode: true

# Fallback model — still via Google AI Studio
fallback:
  model: gemini-2.5-flash
  temperature: 0.2
  max_tokens: 2048
  json_mode: false
